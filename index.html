<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0c1c2c" />
<title>여름방학 서바이벌</title>

<!-- ───────────────────────────────────────────────────────────
     폰트: 제목/UI = Jua(둥근 게임 느낌) · 본문 = Gowun Dodum(가독성)
     ─────────────────────────────────────────────────────────── -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />

<style>
/* ============================================================================
   여름방학 서바이벌  ·  스타일시트
   ----------------------------------------------------------------------------
   섹션
     1. 디자인 토큰 (색/타이포/간격/그림자)
     2. 베이스 & 리셋
     3. 무대(Stage) · 절차적 풍경 레이어
     4. HUD (날짜·날씨 다이어리탭 / 스탯 게이지)
     5. 대화창(Dialogue) · 타자 연출
     6. 선택 카드(Choice cards)
     7. 휴대폰 UI / 문자
     8. 다이어리 전환 · 폴라로이드 추억
     9. 입력 모달 · 화면(인트로/엔딩/리포트)
    10. 애니메이션 키프레임
    11. 반응형 / 접근성
   ========================================================================== */

/* ── 1. 디자인 토큰 ───────────────────────────────────────────────────────── */
:root{
  /* 골든아워 바다 팔레트 */
  --ink:        #142738;   /* 가장 깊은 잉크 — 대화창/글자 */
  --deep:       #0a1622;   /* 위험 비네팅 */
  --sea:        #2a8b9d;   /* 바다 청록 */
  --aqua:       #74d6da;   /* 물빛 하이라이트 */
  --sun:        #ffc54b;   /* 골든아워 햇살 */
  --coral:      #ff7d5e;   /* 노을 코랄 — 스릴/주요 액센트 */
  --coral-deep: #e8593c;
  --leaf:       #6fc27f;   /* 안전 그린 */
  --memory:     #f6a5c0;   /* 추억 핑크 */
  --sand:       #fdf3e3;   /* 따뜻한 종이/모래 */
  --sand-soft:  #fff9ef;

  /* 스탯 색 */
  --stat-safe:   var(--leaf);
  --stat-thrill: var(--coral);
  --stat-memory: var(--memory);
  --stat-vital:  var(--aqua);

  /* 표면/그림자 */
  --panel:        rgba(13, 26, 40, .82);
  --panel-strong: rgba(9, 20, 32, .94);
  --hairline:     rgba(255,255,255,.14);
  --shadow-soft:  0 10px 30px rgba(6,16,28,.35);
  --shadow-card:  0 14px 34px rgba(6,16,28,.42);
  --shadow-pop:   0 24px 60px rgba(6,16,28,.55);

  /* 타이포 */
  --font-display: 'Jua', sans-serif;
  --font-body:    'Gowun Dodum', sans-serif;

  /* 간격 리듬 */
  --r-sm: 10px;  --r-md: 16px;  --r-lg: 24px;  --r-xl: 34px;
  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-soft: cubic-bezier(.4,.0,.2,1);
}

/* ── 2. 베이스 & 리셋 ─────────────────────────────────────────────────────── */
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:var(--font-body);
  background:var(--deep);
  color:var(--sand);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
button{ font-family:inherit; color:inherit; border:none; background:none; cursor:pointer; }
img{ display:block; }

/* 게임 전체 무대: 가로 16:9 기준, 화면을 가득 채우되 중앙 정렬 */
#game{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(120% 90% at 50% 0%, #1a3550 0%, #0a1622 70%);
}
#frame{
  position:relative;
  width:100%; height:100%;
  max-width:calc(100vh * 16 / 9);
  max-height:calc(100vw * 9 / 16);
  overflow:hidden;
  background:#0a1622;
  box-shadow:0 0 80px rgba(0,0,0,.6);
}

/* ── 3. 무대 · 절차적 풍경 레이어 ─────────────────────────────────────────── */
#stage{ position:absolute; inset:0; overflow:hidden; }

/* 풍경은 여러 레이어(하늘/태양/원경/근경/입자)로 패럴랙스 깊이감 부여 */
.scene{ position:absolute; inset:0; opacity:0; transition:opacity .9s var(--ease); }
.scene.show{ opacity:1; }
.scene__sky{ position:absolute; inset:0; transition:background 1.2s var(--ease); }
.scene__svg{ position:absolute; inset:0; width:100%; height:100%; }
.scene__photo{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .9s var(--ease); }
.scene__photo.loaded{ opacity:1; }

/* 빛 입자 / 매미빛 / 빗방울 컨테이너 */
.particles{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.particle{ position:absolute; border-radius:50%; background:rgba(255,229,170,.85);
  filter:blur(.3px); animation:float-up linear infinite; opacity:0; }
.rain{ position:absolute; top:-12%; width:2px; height:54px;
  background:linear-gradient(transparent, rgba(190,225,235,.75));
  animation:rain-fall linear infinite; }

/* 위험 상황 비네팅(긴장 연출) */
.vignette{ position:absolute; inset:0; pointer-events:none; opacity:0;
  background:radial-gradient(120% 100% at 50% 40%, transparent 40%, rgba(8,14,22,.7) 100%);
  transition:opacity .6s var(--ease); }
#frame.tense .vignette{ opacity:1; }
#frame.tense{ animation:tense-pulse 2.6s ease-in-out infinite; }

/* 날씨 오버레이(밝기/색온도 보정) */
.weather-tint{ position:absolute; inset:0; pointer-events:none; mix-blend-mode:multiply;
  opacity:0; transition:opacity 1s var(--ease); }

/* ── 4. HUD ───────────────────────────────────────────────────────────────── */
.hud{ position:absolute; inset:0; pointer-events:none; z-index:6; }

/* 좌상단: 일기장 탭(날짜·요일·날씨) */
.daytab{
  position:absolute; top:18px; left:18px; pointer-events:auto;
  background:linear-gradient(150deg, var(--sand) 0%, var(--sand-soft) 100%);
  color:var(--ink);
  border-radius:6px 16px 16px 16px;
  padding:10px 16px 11px;
  box-shadow:var(--shadow-soft);
  transform:rotate(-1.4deg);
  min-width:148px;
}
.daytab::before{ /* 테이프 */
  content:""; position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(2deg);
  width:54px; height:18px; background:rgba(255,224,150,.6);
  box-shadow:0 1px 4px rgba(0,0,0,.12); border-radius:2px;
}
.daytab__date{ font-family:var(--font-display); font-size:1.18rem; line-height:1; letter-spacing:.5px; }
.daytab__sub{ display:flex; align-items:center; gap:6px; margin-top:5px; font-size:.82rem; color:#5a6b78; }
.daytab__wx{ font-size:1.15rem; }

/* 우상단: 스탯 게이지 클러스터 */
.stats{
  position:absolute; top:16px; right:16px; pointer-events:auto;
  display:flex; flex-direction:column; gap:9px;
  background:var(--panel); backdrop-filter:blur(10px);
  border:1px solid var(--hairline);
  border-radius:var(--r-md);
  padding:13px 15px; min-width:212px;
  box-shadow:var(--shadow-soft);
}
.stat{ display:grid; grid-template-columns:22px 1fr auto; align-items:center; gap:9px; position:relative; }
.stat__icon{ font-size:1.05rem; text-align:center; }
.stat__bar{ height:9px; border-radius:99px; background:rgba(255,255,255,.12); overflow:hidden; position:relative; }
.stat__fill{ position:absolute; inset:0; width:0%; border-radius:99px;
  transition:width .9s var(--ease); }
.stat__fill.safe{   background:linear-gradient(90deg,#4ea863,var(--leaf)); }
.stat__fill.thrill{ background:linear-gradient(90deg,var(--coral-deep),var(--coral)); }
.stat__fill.memory{ background:linear-gradient(90deg,#e87ba3,var(--memory)); }
.stat__fill.vital{  background:linear-gradient(90deg,var(--sea),var(--aqua)); }
.stat__val{ font-family:var(--font-display); font-size:.82rem; min-width:30px; text-align:right;
  color:var(--sand); opacity:.9; }
.stat.bump .stat__icon{ animation:pop .5s var(--ease); }

/* 스탯 변화 플로팅 배지(+2 등) */
.delta{ position:absolute; right:-6px; font-family:var(--font-display); font-size:.95rem;
  padding:1px 8px; border-radius:99px; pointer-events:none; opacity:0;
  animation:delta-rise 1.5s var(--ease) forwards; }
.delta.up{ color:#fff; background:rgba(111,194,127,.95); }
.delta.down{ color:#fff; background:rgba(255,125,94,.95); }

/* 추억 카운터(좌하단 작은 폴라로이드 스택) */
.memcount{ position:absolute; left:18px; bottom:calc(var(--dialogue-h) + 14px);
  pointer-events:auto; display:flex; align-items:center; gap:8px;
  background:var(--panel); border:1px solid var(--hairline); border-radius:99px;
  padding:6px 14px 6px 10px; box-shadow:var(--shadow-soft); font-size:.85rem;
  transition:transform .4s var(--ease); }
.memcount__ph{ font-size:1.05rem; }
.memcount.bump{ transform:scale(1.12); }

/* ── 5. 대화창 ────────────────────────────────────────────────────────────── */
:root{ --dialogue-h: 30%; }
.dialogue{
  position:absolute; left:0; right:0; bottom:0; z-index:5;
  min-height:var(--dialogue-h);
  padding:30px clamp(28px,6vw,90px) 26px;
  background:linear-gradient(transparent, var(--panel-strong) 22%);
  display:flex; flex-direction:column; justify-content:flex-end;
}
.dialogue__name{
  display:inline-block; font-family:var(--font-display); font-size:1.06rem;
  color:var(--ink); background:var(--sun);
  padding:5px 18px; border-radius:12px 12px 12px 2px; margin-bottom:-6px;
  align-self:flex-start; box-shadow:var(--shadow-soft); position:relative; z-index:1;
  opacity:0; transform:translateY(6px); transition:.35s var(--ease);
}
.dialogue__name.show{ opacity:1; transform:none; }
.dialogue__box{
  background:var(--panel); backdrop-filter:blur(8px);
  border:1px solid var(--hairline);
  border-radius:var(--r-lg);
  padding:20px 26px 22px;
  box-shadow:var(--shadow-card);
  max-width:min(940px, 100%);
}
.dialogue__text{ font-size:1.24rem; line-height:1.62; color:#eef4f6; min-height:1.6em;
  letter-spacing:.1px; }
.dialogue__text .narration{ color:#bcd0da; font-style:normal; }
.dialogue__cursor{ display:inline-block; width:.62em; color:var(--sun);
  animation:blink 1s steps(1) infinite; }
.dialogue__next{ position:absolute; right:34px; bottom:24px; color:var(--sun);
  font-size:1.4rem; animation:nudge 1.1s var(--ease) infinite; opacity:0;
  transition:opacity .3s; }
.dialogue__next.show{ opacity:.9; }

/* ── 6. 선택 카드 ─────────────────────────────────────────────────────────── */
.choices{
  position:absolute; left:0; right:0; bottom:0; z-index:8;
  padding:0 clamp(28px,6vw,90px) 30px;
  display:flex; flex-direction:column; gap:12px; align-items:stretch;
  pointer-events:none;
}
.choice{
  pointer-events:auto; position:relative; overflow:hidden;
  text-align:left; width:100%;
  background:linear-gradient(120deg, rgba(253,243,227,.97), rgba(255,249,239,.97));
  color:var(--ink);
  border-radius:14px;
  padding:15px 22px;
  font-size:1.08rem; line-height:1.4;
  box-shadow:var(--shadow-card);
  border-left:5px solid var(--sea);
  transform:translateY(18px); opacity:0;
  transition:transform .28s var(--ease), box-shadow .28s var(--ease), border-color .2s;
  animation:card-in .42s var(--ease) forwards;
}
.choice:nth-child(1){ animation-delay:.04s; }
.choice:nth-child(2){ animation-delay:.12s; }
.choice:nth-child(3){ animation-delay:.20s; }
.choice:nth-child(4){ animation-delay:.28s; }
.choice .num{ font-family:var(--font-display); color:var(--sea); margin-right:10px; }
.choice:hover, .choice:focus-visible{
  transform:translateY(-4px) scale(1.012);
  box-shadow:var(--shadow-pop);
  border-left-color:var(--coral); outline:none;
}
.choice:hover .num{ color:var(--coral); }
.choice:active{ transform:translateY(-1px) scale(.997); }
/* Ripple */
.choice .ripple{ position:absolute; border-radius:50%; transform:scale(0);
  background:rgba(255,125,94,.28); animation:ripple .6s var(--ease) forwards; pointer-events:none; }

/* ── 7. 휴대폰 UI ─────────────────────────────────────────────────────────── */
.phone-wrap{ position:absolute; inset:0; z-index:30; display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,24,.55); opacity:0; pointer-events:none; transition:opacity .4s var(--ease); }
.phone-wrap.show{ opacity:1; pointer-events:auto; }
.phone{
  width:330px; max-width:84vw; background:#0e1a24; border-radius:34px;
  padding:14px; box-shadow:var(--shadow-pop), 0 0 0 2px rgba(255,255,255,.06);
  transform:translateY(40px) scale(.96); transition:transform .5s var(--ease);
}
.phone-wrap.show .phone{ transform:none; }
.phone__notch{ width:120px; height:24px; background:#0e1a24; border-radius:0 0 16px 16px;
  margin:-14px auto 8px; }
.phone__screen{ background:linear-gradient(180deg,#15303f,#0e2330); border-radius:24px;
  padding:16px 14px 18px; min-height:360px; display:flex; flex-direction:column; }
.phone__bar{ display:flex; justify-content:space-between; font-size:.72rem; color:#9fc2cf; margin-bottom:12px; }
.phone__contact{ text-align:center; margin-bottom:14px; }
.phone__avatar{ width:52px; height:52px; border-radius:50%; margin:0 auto 6px;
  display:flex; align-items:center; justify-content:center; font-size:1.5rem;
  background:linear-gradient(135deg,var(--sun),var(--coral)); }
.phone__who{ font-family:var(--font-display); font-size:1.02rem; }
.bubbles{ display:flex; flex-direction:column; gap:9px; flex:1; }
.bubble{ max-width:80%; padding:10px 14px; border-radius:16px; font-size:.96rem; line-height:1.4;
  opacity:0; transform:translateY(8px); animation:bubble-in .45s var(--ease) forwards; }
.bubble.in{ align-self:flex-start; background:#e9f2f4; color:var(--ink); border-bottom-left-radius:4px; }
.bubble.out{ align-self:flex-end; background:var(--coral); color:#fff; border-bottom-right-radius:4px; }
.phone__close{ margin-top:14px; align-self:center;
  font-family:var(--font-display); font-size:.95rem; color:var(--ink);
  background:var(--sun); padding:9px 26px; border-radius:99px; box-shadow:var(--shadow-soft); }

/* ── 8. 다이어리 전환 · 폴라로이드 ────────────────────────────────────────── */
.dayturn{ position:absolute; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(120% 100% at 50% 30%, #21405c, #0a1622);
  opacity:0; pointer-events:none; transition:opacity .5s var(--ease); }
.dayturn.show{ opacity:1; pointer-events:auto; }
.diarycard{
  width:min(440px,80%); background:linear-gradient(160deg,var(--sand),var(--sand-soft));
  color:var(--ink); border-radius:8px; padding:34px 38px 38px;
  box-shadow:var(--shadow-pop); position:relative;
  transform:rotateY(0deg) translateY(20px) scale(.96); opacity:0;
  transition:transform .6s var(--ease), opacity .5s var(--ease);
  background-image:repeating-linear-gradient(transparent, transparent 33px, rgba(20,39,56,.06) 34px);
}
.dayturn.show .diarycard{ transform:none; opacity:1; }
.diarycard::before{ content:""; position:absolute; left:30px; top:0; bottom:0; width:2px;
  background:rgba(255,125,94,.35); }
.diarycard__date{ font-family:var(--font-display); font-size:1.9rem; line-height:1.1; }
.diarycard__wx{ font-size:2.6rem; margin:10px 0 6px; }
.diarycard__line{ font-size:1.04rem; color:#43586a; margin-top:4px; line-height:1.6; }
.diarycard__hint{ margin-top:18px; font-family:var(--font-display); color:var(--sea); font-size:.95rem; }

/* 폴라로이드 추억 팝 */
.polaroid-pop{ position:absolute; inset:0; z-index:42; display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; }
.polaroid-pop.show{ opacity:1; }
.polaroid{
  background:#fff; padding:12px 12px 0; border-radius:4px; box-shadow:var(--shadow-pop);
  width:230px; transform:rotate(-3deg); }
.polaroid__img{ width:100%; aspect-ratio:1/1; border-radius:2px; overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center; font-size:3rem; }
.polaroid__cap{ font-family:var(--font-body); color:#3a3a3a; text-align:center;
  padding:12px 6px 16px; font-size:.95rem; }
.polaroid-pop .polaroid{ animation:polaroid-pop 2.6s var(--ease); }

/* ── 9. 입력 모달 · 화면 ──────────────────────────────────────────────────── */
.modal{ position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,24,.62); backdrop-filter:blur(4px);
  opacity:0; pointer-events:none; transition:opacity .35s var(--ease); }
.modal.show{ opacity:1; pointer-events:auto; }
.askcard{
  width:min(440px,86%); background:linear-gradient(160deg,var(--sand),var(--sand-soft)); color:var(--ink);
  border-radius:var(--r-lg); padding:30px 32px 26px; box-shadow:var(--shadow-pop);
  transform:translateY(16px) scale(.97); transition:transform .4s var(--ease); text-align:center; }
.modal.show .askcard{ transform:none; }
.askcard__q{ font-family:var(--font-display); font-size:1.45rem; line-height:1.3; }
.askcard__hint{ color:#5a6b78; font-size:.92rem; margin-top:8px; line-height:1.5; }
.askcard__input{
  width:100%; margin-top:18px; padding:14px 16px; font-family:var(--font-body); font-size:1.15rem;
  text-align:center; color:var(--ink); background:#fff; border:2px solid #e3d9c6; border-radius:14px;
  outline:none; transition:border-color .2s; }
.askcard__input:focus{ border-color:var(--coral); }
.askcard__go{ margin-top:16px; width:100%; font-family:var(--font-display); font-size:1.1rem; color:#fff;
  background:linear-gradient(120deg,var(--coral),var(--coral-deep)); padding:14px; border-radius:14px;
  box-shadow:var(--shadow-soft); transition:transform .2s var(--ease), filter .2s; }
.askcard__go:hover{ transform:translateY(-2px); filter:brightness(1.05); }
.askcard__go:disabled{ filter:grayscale(.5) brightness(.9); transform:none; cursor:not-allowed; }

/* 전체 화면(인트로/엔딩/리포트) */
.screen{ position:absolute; inset:0; z-index:20; display:none; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; padding:6vh 6vw; }
.screen.show{ display:flex; animation:fade-in .8s var(--ease); }

/* 인트로 */
#intro{ background:radial-gradient(130% 100% at 50% 18%, #ff9e6e 0%, #ff7d5e 22%, #5a4a8c 60%, #1a2540 100%); }
/* 리포트(긴 내용이라 위에서부터 스크롤) */
#report{ background:radial-gradient(130% 100% at 50% 0%, #1f3a4a 0%, #14283a 45%, #0a1622 100%);
  justify-content:flex-start; overflow-y:auto; }
.intro__sun{ position:absolute; top:14%; left:50%; transform:translateX(-50%);
  width:170px; height:170px; border-radius:50%;
  background:radial-gradient(circle,#fff6dc,#ffd470 55%,rgba(255,197,75,0) 72%);
  filter:blur(1px); animation:sun-breathe 6s ease-in-out infinite; }
.intro__waves{ position:absolute; left:0; right:0; bottom:0; height:34%;
  background:linear-gradient(transparent,#1a2540); }
.intro__title{ position:relative; font-family:var(--font-display); font-size:clamp(2.6rem,7vw,4.6rem);
  line-height:1.05; color:#fff; text-shadow:0 6px 26px rgba(8,16,28,.5); letter-spacing:1px; }
.intro__title small{ display:block; font-size:.32em; letter-spacing:8px; color:var(--sun);
  margin-bottom:10px; text-shadow:none; }
.intro__sub{ position:relative; margin-top:18px; font-size:1.16rem; color:#ffeede; line-height:1.7;
  text-shadow:0 2px 12px rgba(8,16,28,.4); }
.intro__btns{ position:relative; margin-top:34px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.btn-main{ font-family:var(--font-display); font-size:1.2rem; color:var(--ink);
  background:linear-gradient(120deg,var(--sun),#ffd470); padding:15px 40px; border-radius:99px;
  box-shadow:var(--shadow-pop); transition:transform .25s var(--ease), filter .2s; }

<script>
/* ===========================================================================
   여기서부터 게임 로직.  (data → systems → ui → director → boot)
   =========================================================================== */

/* ═══════════════════════════════════════════════════════════════════════════
   1) CONFIG · 게임 전역 설정 (튜닝 값은 모두 이곳에 모아 하드코딩 최소화)
   ═══════════════════════════════════════════════════════════════════════════ */
const CONFIG = {
  storageKey: 'musahan_summer_save_v1',
  startMonth: 7, startDay: 23,        // 7월 23일 시작
  totalDays: 12,                      // 개학까지 활동 일수 (확장 가능)
  vitalityMax: 100,
  vitalityLow: 25,                    // 이 아래면 열사병 등 추가 이벤트 가능
  // 이벤트 등급 목표 비중 — 일상50 / 위험징후35 / 실제사고15
  tierTarget: { daily: 0.50, sign: 0.35, danger: 0.15 },
  weekdays: ['일','월','화','수','목','금','토']
};

/* ═══════════════════════════════════════════════════════════════════════════
   2) WEATHER · 날씨 정의 (발생 가능 이벤트와 비주얼을 함께 묶음)
   ═══════════════════════════════════════════════════════════════════════════ */
const WEATHERS = {
  sunny:  { id:'sunny',  label:'맑음', icon:'☀️', vital:0,
            sky:'linear-gradient(180deg,#7ec8e3 0%,#bfe6e0 55%,#ffe9c2 100%)', tint:'rgba(255,180,80,0)',  sun:'#fff2c4' },
  heat:   { id:'heat',   label:'폭염', icon:'🔥', vital:-10,
            sky:'linear-gradient(180deg,#f4b06a 0%,#f7cf94 45%,#fff0cf 100%)', tint:'rgba(255,120,40,.16)', sun:'#fff6df' },
  rain:   { id:'rain',   label:'비',   icon:'🌧️', vital:0,
            sky:'linear-gradient(180deg,#5b7385 0%,#87a0ad 60%,#b9c8cd 100%)', tint:'rgba(40,60,80,.18)',  sun:null },
  storm:  { id:'storm',  label:'호우', icon:'⛈️', vital:-5,
            sky:'linear-gradient(180deg,#2b3a47 0%,#43566a 55%,#6b7d8a 100%)', tint:'rgba(20,30,45,.32)',  sun:null },
  wind:   { id:'wind',   label:'강풍', icon:'🌬️', vital:0,
            sky:'linear-gradient(180deg,#88aec2 0%,#aecdda 55%,#dcefef 100%)', tint:'rgba(80,110,130,.08)', sun:'#fff2c4' },
  cloudy: { id:'cloudy', label:'흐림', icon:'☁️', vital:0,
            sky:'linear-gradient(180deg,#9fb4bf 0%,#c3d2d8 55%,#e6eef0 100%)', tint:'rgba(120,140,150,.08)', sun:null }
};
// 다음 날씨를 정할 때의 가중치 (맑음/폭염이 여름답게 자주)
const WEATHER_WEIGHTS = { sunny:32, heat:22, cloudy:16, wind:12, rain:12, storm:6 };

/* ═══════════════════════════════════════════════════════════════════════════
   3) LOCATIONS · 장소 정의
   - allowedWeather: 그 장소를 갈 수 있는 날씨 (없으면 언제나)
   ═══════════════════════════════════════════════════════════════════════════ */
const LOCATIONS = {
  beach:    { id:'beach',    name:'해수욕장', icon:'🏖️', blurb:'파도 소리와 시원한 바다',       allowedWeather:['sunny','heat','cloudy','wind'] },
  valley:   { id:'valley',   name:'계곡',     icon:'🏞️', blurb:'맑고 차가운 계곡물',           allowedWeather:['sunny','heat','cloudy'] },
  camp:     { id:'camp',     name:'캠핑장',   icon:'🏕️', blurb:'텐트와 모닥불, 별이 가득한 밤', allowedWeather:['sunny','cloudy','wind'] },
  bike:     { id:'bike',     name:'자전거 도로',   icon:'🚲', blurb:'동네 한 바퀴 라이딩',          allowedWeather:['sunny','cloudy','wind'] },
  home:     { id:'home',     name:'집',       icon:'🏡', blurb:'에어컨 켜고 집에서 뒹굴기',     allowedWeather:null },
  festival: { id:'festival', name:'여름축제', icon:'🎡', blurb:'사람 많은 밤의 축제',          allowedWeather:['sunny','heat','cloudy','wind'] },
  park:     { id:'park',     name:'공원',     icon:'🌳', blurb:'가까운 공원에서 산책',          allowedWeather:['sunny','heat','cloudy','wind'] },
  hike:     { id:'hike',     name:'등산',     icon:'⛰️', blurb:'초록빛 산을 오르기',           allowedWeather:['sunny','cloudy'] }
};

/* ═══════════════════════════════════════════════════════════════════════════
   4) SceneArt · 절차적 풍경 생성기
   ---------------------------------------------------------------------------
   실제 이미지(/assets/images/<file>)가 있으면 그 위에 얹고, 없으면(onerror)
   SVG로 그린 레이어드 풍경이 그대로 보인다. → 플레이스홀더 상태에서도 완성도 유지.
   각 장소 painter는 viewBox 0 0 1600 900 기준 SVG 문자열(뒤→앞 레이어)을 반환.
   ═══════════════════════════════════════════════════════════════════════════ */
const SceneArt = (() => {
  // 색을 살짝 어둡/밝게
  const sh = (hex, amt) => {
    const n = parseInt(hex.slice(1),16);
    let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return '#'+(1<<24|r<<16|g<<8|b).toString(16).slice(1);
  };
  // 부드러운 언덕 path
  const hill = (baseY, amp, color, seed=0) => {
    const pts=[];
    for(let x=0;x<=1600;x+=200){
      const y = baseY + Math.sin((x*0.004)+seed)*amp + Math.cos((x*0.011)+seed*1.7)*amp*0.4;
      pts.push([x,y]);
    }
    let d=`M0 900 L0 ${pts[0][1].toFixed(0)} `;
    for(let i=0;i<pts.length-1;i++){
      const [x1,y1]=pts[i], [x2,y2]=pts[i+1], mx=(x1+x2)/2;
      d+=`Q ${x1} ${y1.toFixed(0)} ${mx} ${((y1+y2)/2).toFixed(0)} `;
    }
    d+=`L1600 900 Z`;
    return `<path d="${d}" fill="${color}"/>`;
  };
  const sun = (color,x=1180,y=230,r=120) =>
    `<circle cx="${x}" cy="${y}" r="${r}" fill="${color}" opacity=".9"/>
     <circle cx="${x}" cy="${y}" r="${r*1.5}" fill="${color}" opacity=".18"/>`;
  const cloud = (x,y,s,c='#ffffff',o=.85) =>
    `<g opacity="${o}"><ellipse cx="${x}" cy="${y}" rx="${90*s}" ry="${36*s}" fill="${c}"/>

  /** location, weatherId, {tense} → DOM 노드(.scene) */
  function build(locationId, weatherId, opts={}){
    const wx = WEATHERS[weatherId] || WEATHERS.sunny;
    const paint = painters[locationId] || painters._default;
    const layers = paint(wx).filter(Boolean).join('');
    const scene = document.createElement('div');
    scene.className = 'scene';
    // 하늘
    const sky = document.createElement('div');
    sky.className = 'scene__sky';
    sky.style.background = wx.sky;
    // SVG 풍경
    const svgWrap = document.createElement('div');
    svgWrap.className = 'scene__svg';
    svgWrap.innerHTML = `<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">${layers}</svg>`;
    scene.appendChild(sky);
    scene.appendChild(svgWrap);
    // 실제 이미지가 있으면 위에 얹기(없으면 자동 숨김 → SVG가 보임)
    if(opts.image){
      const img = document.createElement('img');
      img.className = 'scene__photo';
      img.alt = '';
      img.src = './assets/images/' + opts.image;
      img.onload  = () => img.classList.add('loaded');
      img.onerror = () => img.remove();
      scene.appendChild(img);
    }
    return scene;
  }
  return { build };
})();

/* ═══════════════════════════════════════════════════════════════════════════
   6) Random · 작은 난수 유틸 (재현 가능한 형태로 분리해 두면 테스트도 쉽다)
   ═══════════════════════════════════════════════════════════════════════════ */
const Random = {
  int:(n)=> Math.floor(Math.random()*n),
  pick:(arr)=> arr[Math.floor(Math.random()*arr.length)],
  shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Random.int(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; },
  // {key:weight} 객체에서 가중 선택
  weighted(weights){
    let total=0; for(const k in weights) total+=weights[k];
    let r=Math.random()*total;
    for(const k in weights){ r-=weights[k]; if(r<=0) return k; }
    return Object.keys(weights)[0];
  }
};

    dayIndex:0,                       // 0 = 7월 23일
    weather:'sunny',
    stats:{ safety:0, thrill:0, memory:0 },
    vitality:CONFIG.vitalityMax,
    flags:{},
    seenEvents:[],
    memories:[],                      // {cap,emoji,img,day}
    visited:[],                       // 방문 장소 id 순서대로
    friendNotes:{},                   // 테마 -> 횟수 (친구가 기억)
    guardianTexted:false,
    finished:false
  });

  let state = fresh();

  function save(){
    const raw = JSON.stringify(state);
    if(storageOK){ try{ localStorage.setItem(CONFIG.storageKey, raw); return; }catch(e){ storageOK=false; } }
    memCache = raw;
  }
  function rawLoad(){
    if(storageOK){ try{ return localStorage.getItem(CONFIG.storageKey); }catch(e){ storageOK=false; } }
    return memCache;
  }
  function load(){
    const raw = rawLoad();
    if(!raw) return false;
    try{ state = Object.assign(fresh(), JSON.parse(raw)); return true; }
    catch(e){ return false; }
  }
  function hasSave(){
    const raw = rawLoad();
    if(!raw) return false;
    try{ const s=JSON.parse(raw); return !s.finished && (s.dayIndex>0 || s.playerName); }
    catch(e){ return false; }
  }
  function clear(){
    state = fresh();
    if(storageOK){ try{ localStorage.removeItem(CONFIG.storageKey); }catch(e){} }
    memCache = null;
  }
  return {
    get s(){ return state; },
    reset(){ state = fresh(); },
    save, load, hasSave, clear
  };
})();

const DateUtil = {

/* ═══════════════════════════════════════════════════════════════════════════
   10) EventManager · 이벤트 선택 (중복 방지 + 50/35/15 비중 유지)
   ---------------------------------------------------------------------------
   ▸ 메인 이벤트: 선택한 장소 + 현재 날씨 + requires 를 만족하고 아직 안 본 것 중,
     목표 비중(daily50/sign35/danger15)에 가장 '부족한' 등급을 우선해 뽑는다.
   ▸ 조건부(__any__) 이벤트: 활력 저하 시 '추가'로 발생 (열사병/수분보충).
   ═══════════════════════════════════════════════════════════════════════════ */
const EventManager = {
  _ok(ev, loc){
    const s = Store.s;
    if(s.seenEvents.includes(ev.id)) return false;
    if(ev.weather && !ev.weather.includes(s.weather)) return false;
    if(typeof ev.requires==='function' && !ev.requires(s)) return false;
    if(loc!=null && ev.location!==loc) return false;
    return true;
  },
  // 현재 본 이벤트들의 등급 분포에서 가장 부족한 등급을 고른다
  _neediestTier(pool){
    const seen = Store.s.seenEvents.map(id=> (EVENTS.find(e=>e.id===id)||{}).tier).filter(Boolean);
    const total = seen.length || 1;
    const have = { daily:0, sign:0, danger:0 };
    seen.forEach(t=> have[t]!==undefined && have[t]++);
    const avail = new Set(pool.map(e=>e.tier));
    // 목표 대비 부족분이 큰 등급 우선 (단, 후보가 있는 등급만)
    let best=null, bestGap=-Infinity;
    for(const tier of ['daily','sign','danger']){
      if(!avail.has(tier)) continue;
      const gap = CONFIG.tierTarget[tier] - (have[tier]/total);
      if(gap>bestGap){ bestGap=gap; best=tier; }
    }
    return best;
  },
  pickMain(loc){
    const pool = EVENTS.filter(e=> e.location!=='__any__' && this._ok(e, loc));
    if(!pool.length) return null;
    const tier = this._neediestTier(pool);
    const tierPool = pool.filter(e=> e.tier===tier);
    const ev = Random.pick(tierPool.length? tierPool : pool);
    return ev;
  },
  // 활력 저하 등으로 발생하는 '추가' 이벤트 (메인 이벤트 뒤에)
  pickConditional(){
    const pool = EVENTS.filter(e=> e.location==='__any__' && this._ok(e, null));
    if(!pool.length) return null;
    // danger(열사병) 우선
    pool.sort((a,b)=> (a.tier==='danger'?-1:1) - (b.tier==='danger'?-1:1));
    return pool[0];
  },
  markSeen(ev){ if(ev && !Store.s.seenEvents.includes(ev.id)) Store.s.seenEvents.push(ev.id); }
};

/* ═══════════════════════════════════════════════════════════════════════════
   11) StatSystem · 효과 적용 (값 변경만; 연출은 UI 가 담당)
   ═══════════════════════════════════════════════════════════════════════════ */
const StatSystem = {
  apply(effects={}){
    const s = Store.s;
    const before = { safety:s.stats.safety, thrill:s.stats.thrill, memory:s.stats.memory, vitality:s.vitality };
    if(effects.safety) s.stats.safety += effects.safety;
    if(effects.thrill) s.stats.thrill += effects.thrill;
    if(effects.memory) s.stats.memory += effects.memory;
    if(effects.vitality) s.vitality = Math.max(0, Math.min(CONFIG.vitalityMax, s.vitality + effects.vitality));
    return {
      safety:s.stats.safety-before.safety,
      thrill:s.stats.thrill-before.thrill,
      memory:s.stats.memory-before.memory,
      vitality:s.vitality-before.vitality
    };
  }
};

/* ═══════════════════════════════════════════════════════════════════════════
   12) Sound · 오디오 매니저 (파일은 /assets/sounds 플레이스홀더, 없으면 조용)
   ═══════════════════════════════════════════════════════════════════════════ */
const Sound = (() => {
  let on = false;                 // 기본 OFF (교실 환경 배려)
  const cache = {};
  const FILES = {                 // 논리이름 -> 파일 (있으면 재생, 없으면 무시)
    waves:'waves.mp3', cicada:'cicada.mp3', rain:'rain.mp3', thunder:'thunder.mp3',
    birds:'birds.mp3', campfire:'campfire.mp3', tension:'tension.mp3',
    click:'click.mp3', pop:'pop.mp3', success:'success.mp3', whoosh:'whoosh.mp3'
  };
  let bgmEl = null, bgmName = null;
  function el(name){
    if(cache[name]) return cache[name];
    if(!FILES[name]) return null;
    const a = new Audio('./assets/sounds/'+FILES[name]);
    a.preload='none'; cache[name]=a; return a;
  }
  function sfx(name){
    if(!on) return;
    const a = el(name); if(!a) return;
    try{ a.currentTime=0; a.volume=0.6; a.play().catch(()=>{}); }catch(e){}
  }
  function bgm(name){
    if(name===bgmName) return;
    bgmName = name;
    if(bgmEl){ try{ bgmEl.pause(); }catch(e){} bgmEl=null; }
    if(!on || !name) return;
    const a = el(name); if(!a) return;
    a.loop=true; a.volume=0.35;
    try{ a.play().catch(()=>{}); bgmEl=a; }catch(e){}
  }
  function toggle(){
    on=!on;
    document.getElementById('soundToggle').textContent = on?'🔊':'🔇';
    if(!on){ if(bgmEl){ try{bgmEl.pause();}catch(e){} bgmEl=null; } }
    else if(bgmName){ const n=bgmName; bgmName=null; bgm(n); }
    return on;
  }
  return { sfx, bgm, toggle, get on(){return on;} };
})();

/* ═══════════════════════════════════════════════════════════════════════════
   13) Scene · 무대 연출 (배경 교체 · 날씨틴트 · 입자 · 패럴랙스 · 긴장 비네팅)
   ═══════════════════════════════════════════════════════════════════════════ */
const Scene = (() => {
  const stage = document.getElementById('stage');
  const tintEl = document.getElementById('weatherTint');
  const frame = document.getElementById('frame');
  let current = null;

  // 날씨별 입자 레이어 생성 (맑음/폭염=빛 먼지, 비/호우=빗줄기)
  function particlesFor(weatherId){
    const layer = document.createElement('div');
    layer.className = 'particles';
    if(weatherId==='rain' || weatherId==='storm'){
      const n = weatherId==='storm'? 60 : 38;
      for(let i=0;i<n;i++){
        const r = document.createElement('span');
        r.className = 'rain';
        r.style.left = Math.random()*100 + '%';
        r.style.animationDuration = (0.5 + Math.random()*0.5) + 's';
        r.style.animationDelay = (-Math.random()*1) + 's';
        r.style.opacity = 0.4 + Math.random()*0.5;
        layer.appendChild(r);
      }
    } else if(weatherId==='sunny' || weatherId==='heat'){
      const n = 18;
      for(let i=0;i<n;i++){
        const p = document.createElement('span');
        p.className = 'particle';
        const sz = 3 + Math.random()*5;
        p.style.width = p.style.height = sz+'px';
        p.style.left = Math.random()*100 + '%';
        p.style.bottom = (Math.random()*40) + '%';
        p.style.animationDuration = (6 + Math.random()*7) + 's';
        p.style.animationDelay = (-Math.random()*8) + 's';
        layer.appendChild(p);
      }
    }
    return layer;
  }

  function show(locationId, weatherId, opts={}){
    const wx = WeatherSystem.meta(weatherId);
    const scene = SceneArt.build(locationId, weatherId, opts);
    scene.appendChild(particlesFor(weatherId));
    stage.appendChild(scene);
    // 강제 리플로우 후 페이드 인 (크로스페이드)
    void scene.offsetWidth;
    scene.classList.add('show');
    const prev = current;
    current = scene;
    if(prev){ prev.classList.remove('show'); setTimeout(()=> prev.remove(), 950); }
    // 날씨 틴트
    tintEl.style.background = wx.tint;
    tintEl.style.opacity = wx.tint==='rgba(255,180,80,0)'? 0 : 1;
  }

  function setTense(on){ frame.classList.toggle('tense', !!on); }

  // 패럴랙스 — 포인터 위치에 따라 풍경을 미세하게 이동
  frame.addEventListener('pointermove', (e)=>{
    if(!current) return;
    const rect = frame.getBoundingClientRect();
    const dx = ((e.clientX-rect.left)/rect.width - 0.5);
    const dy = ((e.clientY-rect.top)/rect.height - 0.5);
    const svg = current.querySelector('.scene__svg');
    const photo = current.querySelector('.scene__photo');
    if(svg) svg.style.transform = `translate(${dx*-14}px, ${dy*-8}px) scale(1.03)`;
    if(photo) photo.style.transform = `translate(${dx*-10}px, ${dy*-6}px) scale(1.05)`;
  });

  return { show, setTense };
})();

/* ═══════════════════════════════════════════════════════════════════════════
   14) UI · 대화/선택/HUD/전환/입력 — 화면과 상호작용하는 모든 것
   ═══════════════════════════════════════════════════════════════════════════ */
const UI = (() => {
  const $ = (id)=> document.getElementById(id);
  const dialogue=$('dialogue'), nameEl=$('speakerName'), textEl=$('dialogueText'), arrow=$('nextArrow');
  const choicesEl=$('choices'), hud=$('hud');

  // ── 화자 이름 해석: 'narration'→설명, 'you'/'나'→내이름, 'friend'/'친구'→친구이름
  function speaker(who){
    if(who==='narration'||who==='') return null;
    if(who==='you'||who==='나') return Store.s.playerName || '나';
    if(who==='friend'||who==='친구') return Store.s.friendName || '친구';
    if(who==='보호자') return Store.s.guardianName || '보호자';
    return who;
  }

  // ── 클릭 게이트(다음 진행) ──
  let advanceResolve=null, typing=false, skip=false;
  function advance(){
    if(typing){ skip=true; return; }
    if(advanceResolve){ const r=advanceResolve; advanceResolve=null; arrow.classList.remove('show'); r(); }
  }
  dialogue.addEventListener('click', advance);

  // ── 타자 연출 ──
  function sleep(ms){ return new Promise(r=> setTimeout(r,ms)); }
  async function typewrite(str, isNarration){
    textEl.className = 'dialogue__text' + (isNarration?' show-narr':'');
    textEl.innerHTML='';
    const span = document.createElement('span');
    if(isNarration) span.className='narration';
    textEl.appendChild(span);
    const cursor = document.createElement('span');
    cursor.className='dialogue__cursor'; cursor.textContent='▌';
    textEl.appendChild(cursor);
    typing=true; skip=false;
    for(let i=0;i<str.length;i++){
      span.textContent = str.slice(0,i+1);
      if(skip){ span.textContent=str; break; }
      const ch=str[i];
      await sleep(ch===' '?6 : (ch==='.'||ch==='!'||ch==='?'||ch==='…')?70 : (ch===','? 34: 17));
    }
    typing=false;
    cursor.remove();
  }

  // ── 한 줄 대사 출력 후 클릭 대기 ──
  async function say(who, text){
    dialogue.style.display='flex';
    const name = speaker(who);
    if(name){ nameEl.textContent=name; nameEl.classList.add('show'); }
    else nameEl.classList.remove('show');
    await typewrite(text, name===null);
    arrow.classList.add('show');
    Sound.sfx('click');
    await new Promise(res=> advanceResolve=res);
  }
  // 여러 줄 연속
  async function sayAll(lines){ for(const l of lines) await say(l.who, l.text); }

  // ── 선택 카드 ──
  function clearChoices(){ choicesEl.innerHTML=''; }
  function choose(choices){
    return new Promise(resolve=>{
      clearChoices();
      arrow.classList.remove('show');
      choices.forEach((c, idx)=>{
        const btn=document.createElement('button');
        btn.className='choice'; btn.type='button';
        btn.innerHTML = `<span class="num">${idx+1}</span>${c.label}`;
        btn.addEventListener('click', (e)=>{
          // 리플
          const rip=document.createElement('span'); rip.className='ripple';
          const r=btn.getBoundingClientRect(), d=Math.max(r.width,r.height);
          rip.style.width=rip.style.height=d+'px';
          rip.style.left=(e.clientX-r.left-d/2)+'px';
          rip.style.top=(e.clientY-r.top-d/2)+'px';
          btn.appendChild(rip);
          Sound.sfx('pop');
          // 잠깐의 여운 뒤 정리
          [...choicesEl.children].forEach(ch=> ch.style.pointerEvents='none');
          setTimeout(()=>{ clearChoices(); resolve(idx); }, 220);
        });
        choicesEl.appendChild(btn);
      });
    });
  }

  // ── HUD ──
  const DISPLAY_MAX=36;             // 영구 스탯 게이지 표시용 소프트 최대
  function showHud(){ hud.style.display='block'; }
  function fillPct(v){ return Math.max(0, Math.min(100, (v/DISPLAY_MAX)*100)); }
  function renderHud(){
    const s=Store.s, d=DateUtil.for(s.dayIndex), wx=WeatherSystem.meta(s.weather);
    $('dtDate').textContent=d.short; $('dtWx').textContent=wx.icon; $('dtWxLabel').textContent=wx.label;
    $('barSafety').style.width=fillPct(s.stats.safety)+'%'; $('valSafety').textContent=s.stats.safety;
    $('barThrill').style.width=fillPct(s.stats.thrill)+'%'; $('valThrill').textContent=s.stats.thrill;
    $('barMemory').style.width=fillPct(s.stats.memory)+'%'; $('valMemory').textContent=s.stats.memory;
    $('barVital').style.width=Math.max(0,Math.min(100,s.vitality))+'%'; $('valVital').textContent=Math.round(s.vitality);
    if(s.memories.length){ $('memcount').style.display='flex'; $('memcountText').textContent=`특별한 추억 ${s.memories.length}개`; }
  }
  // 스탯 변화 연출 — 게이지 갱신 + 떠오르는 델타(+2 등)
  async function applyAndAnimate(deltas){
    const map=[['safety','Safety','🛡'],['thrill','Thrill','⚡'],['memory','Memory','📸'],['vitality','Vital','💧']];
    renderHud();
    for(const [key,cap] of map){
      const dv=deltas[key]; if(!dv) continue;
      const row = document.querySelector(`#stats .stat[data-k="${key}"]`) || $('bar'+cap)?.closest('.stat');
      const host = $('bar'+cap)?.closest('.stat');
      if(host){
        host.classList.add('bump'); setTimeout(()=> host.classList.remove('bump'), 520);
        const del=document.createElement('span');
        del.className='delta '+(dv>0?'up':'down');
        del.textContent=(dv>0?'+':'')+dv;
        host.appendChild(del);
        setTimeout(()=> del.remove(), 1300);
      }
      await sleep(140);
    }
    Sound.sfx('success');
  }

  // ── 하루 전환 다이어리 카드 ──
  function dayTurn(){
    return new Promise(resolve=>{
      const s=Store.s, d=DateUtil.for(s.dayIndex), wx=WeatherSystem.meta(s.weather);
      $('diaryDate').textContent=d.full;
      $('diaryWx').textContent=wx.icon;
      const lines=[
        '오늘은 어떤 하루가 될까?', '여름 냄새가 난다.', '괜히 기분 좋은 아침.',
        '창문으로 들어오는 햇살.', '오늘도 무사히, 그리고 신나게!'
      ];
      $('diaryLine').textContent = s.dayIndex===0? '드디어 방학 첫날. 가방을 챙기자!' : Random.pick(lines);
      $('diaryHint').textContent='화면을 눌러 시작 ▾';
      const dt=$('dayturn'); dt.classList.add('show'); Sound.sfx('whoosh');
      const go=()=>{ dt.classList.remove('show'); dt.removeEventListener('click',go); setTimeout(resolve,420); };
      dt.addEventListener('click', go);
    });
  }

  // ── 폴라로이드(추억) 팝업 ──
  function polaroid(mem){
    return new Promise(resolve=>{
      const pop=$('polaroidPop');
      $('polImg').textContent = mem.emoji||'📸';
      $('polCap').textContent = mem.cap||'';
      pop.classList.add('show'); Sound.sfx('pop');
      setTimeout(()=>{ pop.classList.remove('show'); resolve(); }, 2500);
    });
  }

  // ── 토스트 ──
  let toastT=null;
  function toast(msg){
    const t=$('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=> t.classList.remove('show'), 2200);
  }

  // ── 입력 모달 (이름 등) → Promise<string> ──
  function ask(question, hint=''){
    return new Promise(resolve=>{
      const m=$('askModal'), input=$('askInput'), go=$('askGo');
      $('askQ').textContent=question; $('askHint').textContent=hint;
      input.value=''; go.disabled=true;
      m.classList.add('show'); setTimeout(()=> input.focus(), 60);
      const onInput=()=>{ go.disabled = input.value.trim().length===0; };
      const submit=()=>{
        const v=input.value.trim(); if(!v) return;
        m.classList.remove('show');
        input.removeEventListener('input', onInput);
        go.removeEventListener('click', submit);
        input.removeEventListener('keydown', onKey);
        Sound.sfx('success');
        resolve(v);
      };
      const onKey=(e)=>{ if(e.key==='Enter' && input.value.trim()) submit(); };
      input.addEventListener('input', onInput);
      go.addEventListener('click', submit);
      input.addEventListener('keydown', onKey);
    });
  }

  return { say, sayAll, choose, showHud, renderHud, applyAndAnimate, dayTurn, polaroid, toast, ask,
           hideDialogue(){ dialogue.style.display='none'; nameEl.classList.remove('show'); } };
})();

/* ═══════════════════════════════════════════════════════════════════════════
   15) PhoneSystem · 휴대폰 문자 UI (친구/보호자/기상청)
   ═══════════════════════════════════════════════════════════════════════════ */
const PhoneSystem = (() => {
  const $ = (id)=> document.getElementById(id);
  function whoName(who){
    if(who==='친구') return Store.s.friendName || '친구';
    if(who==='보호자') return Store.s.guardianName || '보호자';
    return who;
  }
  async function show(phone){
    // 보호자가 처음 문자하면 발신자 이름을 직접 입력받는다 (가족 형태 다양성 고려)
    if(phone.who==='보호자' && !Store.s.guardianName){
      Store.s.guardianName = await UI.ask('휴대폰이 울린다. 이 문자, 누구라고 저장해 둘까?',
        '너를 챙겨주는 분은 누구야? (예: 엄마, 아빠, 할머니, 이모…)');
    }
    const wrap=$('phoneWrap'), bub=$('phoneBubbles');
    $('phoneAvatar').textContent = phone.emoji || '📩';
    $('phoneWho').textContent = whoName(phone.who);
    const now=new Date(); $('phoneTime').textContent='오후 '+(((now.getHours()+11)%12)+1)+':'+String(now.getMinutes()).padStart(2,'0');
    bub.innerHTML='';
    wrap.classList.add('show'); Sound.sfx('pop');
    // 메시지를 하나씩 등장
    for(const m of phone.msgs){
      await new Promise(r=> setTimeout(r, 520));
      const b=document.createElement('div');
      b.className='bubble '+(m.in?'in':'out');
      b.textContent=m.text;
      bub.appendChild(b); bub.scrollTop=bub.scrollHeight;
    }
    // 확인 버튼 대기
    await new Promise(resolve=>{
      const btn=$('phoneClose');
      const close=()=>{ wrap.classList.remove('show'); btn.removeEventListener('click',close); setTimeout(resolve,260); };
      btn.addEventListener('click', close);
    });
  }
  return { show };
})();

/* ═══════════════════════════════════════════════════════════════════════════
   16) EndingSystem · 안전/스릴/추억 조합으로 엔딩 + 배지 계산
   ═══════════════════════════════════════════════════════════════════════════ */
const EndingSystem = (() => {
  // 배지 정의: 조건이 참이면 획득 (flag 또는 누적 지표)
  const BADGES = [
    { id:'warmup',   emoji:'🤸', name:'준비운동 마스터',  when:s=> s.flags.didWarmup },
    { id:'buoy',     emoji:'🛟', name:'부표 지킴이',       when:s=> s.flags.stayedInBuoy },
    { id:'riptide',  emoji:'🌊', name:'이안류 생존자',     when:s=> s.flags.riptideEscaped },
    { id:'jelly',    emoji:'🪼', name:'해파리 침착왕',     when:s=> s.flags.jellyHandled },
    { id:'rescue',   emoji:'🚑', name:'생명을 구한 손',    when:s=> s.flags.calledHelp },
    { id:'fire',     emoji:'🔥', name:'불 안전 지킴이',    when:s=> s.flags.safeFire || s.flags.safeCook },
    { id:'bee',      emoji:'🐝', name:'벌 앞의 동상',      when:s=> s.flags.beeCalm },
    { id:'helmet',   emoji:'🚲', name:'헬멧 라이더',       when:s=> s.flags.woreHelmet },
    { id:'signal',   emoji:'🚦', name:'신호 지킴이',       when:s=> s.flags.obeySignal },
    { id:'door',     emoji:'🏠', name:'문단속 박사',       when:s=> s.flags.noOpenDoor },
    { id:'meet',     emoji:'🕗', name:'약속 장소 기억왕',  when:s=> s.flags.setMeetPoint },
    { id:'flood',    emoji:'⛰️', name:'계곡 탈출 성공',    when:s=> s.flags.floodEscaped },
    { id:'light',    emoji:'⚡', name:'낙뢰 회피',         when:s=> s.flags.lightningSafe },
    { id:'heat',     emoji:'💧', name:'온열질환 극복',     when:s=> s.flags.heatRecovered || s.flags.heatCared },
    { id:'album',    emoji:'📸', name:'추억 부자',         when:s=> s.memories.length>=12 },
    { id:'guard',    emoji:'🛡️', name:'안전 만렙',         when:s=> s.stats.safety>=18 },
    { id:'thrill',   emoji:'⚡', name:'스릴 헌터',         when:s=> s.stats.thrill>=12 },
    { id:'every',    emoji:'🌞', name:'하루도 안 쉰 여행자', when:s=> s.visited.length>=CONFIG.totalDays }
  ];

  // 엔딩 정의: 위에서부터 먼저 맞는 것 (가장 특별한 엔딩이 위)
  const ENDINGS = [
    { key:'radiant', title:'여름을 가장 환하게 보낸 아이',
      when:(s)=> s.stats.safety>=14 && s.memories.length>=10,
      desc:'무리하지 않고, 신중하게 고른 선택들이 신기하게도 가장 많은 추억을 남겼다. 다친 데 하나 없이 사진첩은 가득. 안전하게 노는 것이 결국 제일 신나는 여름이라는 걸, 너는 몸으로 알게 되었다.' },
    { key:'wise',    title:'현명한 모험가',
      when:(s)=> s.stats.safety>=10 && s.stats.thrill>=8,
      desc:'겁먹고 멈추기만 한 것도, 무작정 뛰어든 것도 아니었다. 위험은 피하고 즐길 건 제대로 즐긴 여름. 모험과 안전, 두 마리 토끼를 다 잡았다.' },
    { key:'guardian',title:'여름의 든든한 수호자',
      when:(s)=> s.stats.safety>=14,
      desc:'언제나 한 박자 신중했던 너. 친구들은 “너랑 다니면 마음이 놓여”라고 했다. 큰 사고 한 번 없이, 모두를 지킨 여름이었다.' },
    { key:'collector',title:'추억 수집가',
      when:(s)=> s.memories.length>=11,
      desc:'사진첩이 터질 듯 가득하다. 장면 하나하나가 반짝인다. 이 여름은 오래오래 기억될 것이다.' },
    { key:'daredevil',title:'겁 없는 여름의 질주',
      when:(s)=> s.stats.thrill>=10 && s.stats.thrill> s.stats.safety,
      desc:'짜릿한 순간이 많았던 여름. 다만 가끔은 아슬아슬했다. 다음 여름엔 그 에너지에 ‘조금의 신중함’만 더해보자. 그럼 무적이다.' }
  ];
  const DEFAULT = { key:'safe', title:'여름방학 서바이벌',
    desc:'특별히 큰일은 없었지만, 그래서 더 좋았던 방학. 크고 작은 순간들을 무사히 지나, 너는 한 뼘 더 자랐다.' };

  function compute(){
    const s=Store.s;
    const ending = ENDINGS.find(e=> e.when(s)) || DEFAULT;
    const badges = BADGES.filter(b=> b.when(s)).map(b=>({emoji:b.emoji, name:b.name}));
    return { ending, badges };
  }
  return { compute };
})();

/* ═══════════════════════════════════════════════════════════════════════════
   17) Game · 디렉터 (전체 흐름 제어)
   ═══════════════════════════════════════════════════════════════════════════ */
const Game = (() => {
  const weatherBgm = { sunny:'cicada', heat:'cicada', cloudy:'birds', wind:'birds', rain:'rain', storm:'thunder' };
  const rememberLines = {
    '안전하게 놀자':['또 안전한 쪽으로 가자고 하네. 너랑 다니면 진짜 마음이 놓여 ㅎㅎ','지난번에도 안전하게 놀자고 했었지? 역시 너답다.'],
    '준비운동':['이번에도 준비운동부터! 너 은근 철저하다 ㅋㅋ'],
    '침착하게 대처':['넌 위급할 때 진짜 침착하더라. 지난번에도 그랬잖아.']
  };

  // 이벤트에 친구가 등장하는지 (친구 이름 선입력 판단용)
  function mentionsFriend(ev){
    const hit = (l)=> l && (l.who==='friend'||l.who==='친구');
    if((ev.setup||[]).some(hit)) return true;
    if((ev.choices||[]).some(c=> (c.result||[]).some(hit))) return true;
    if((ev.choices||[]).some(c=> c.friendNote)) return true;
    return false;
  }

  async function ensureFriend(){
    if(Store.s.friendName) return;
    Store.s.friendName = await UI.ask('마침 친구에게서 연락이 왔다. 이번 여름 같이 놀 단짝 친구의 이름은?',
      '게임 내내 이 친구가 너와 함께 다니게 돼.');
    UI.toast(`${Store.s.friendName}와(과) 함께하는 여름!`);
  }

  // 한 이벤트 전체 실행
  async function runEvent(ev, loc){
    if(mentionsFriend(ev)) await ensureFriend();
    Scene.show(loc, Store.s.weather, { image: ev.image, tense: ev.tense });
    Scene.setTense(!!ev.tense);
    Sound.bgm(ev.bgm || weatherBgm[Store.s.weather]);
    await UI.sayAll(ev.setup||[]);
    if(ev.prompt) await UI.say('narration', ev.prompt);
    const idx = await UI.choose(ev.choices);
    const choice = ev.choices[idx];
    Scene.setTense(!!choice.tense);
    await UI.sayAll(choice.result||[]);
    // 친구가 기억하기 (같은 테마 반복 시)
    if(choice.friendNote){
      const cnt = Store.s.friendNotes[choice.friendNote]||0;
      if(cnt>=1 && rememberLines[choice.friendNote]) await UI.say('friend', Random.pick(rememberLines[choice.friendNote]));
      Store.s.friendNotes[choice.friendNote]=cnt+1;
    }
    // 스탯 변화 연출
    const deltas = StatSystem.apply(choice.effects||{});
    await UI.applyAndAnimate(deltas);
    Scene.setTense(false);
    // 추억 폴라로이드
    if(choice.memory){
      const mem = Object.assign({ day:Store.s.dayIndex }, choice.memory);
      Store.s.memories.push(mem);
      UI.renderHud();
      await UI.polaroid(mem);
    }
    // 휴대폰 문자
    if(choice.phone) await PhoneSystem.show(choice.phone);
    EventManager.markSeen(ev);
  }

  // 이벤트가 없을 때의 잔잔한 채움 비트 (반복돼도 무방한 일상)
  async function fillerBeat(loc){
    const L = LOCATIONS[loc];
    Scene.show(loc, Store.s.weather, { image: loc+'_idle.webp' });
    Sound.bgm(weatherBgm[Store.s.weather]);
    await UI.say('narration', `${L.name}에서 한가로이 시간을 보냈다. 별일은 없었지만, 이런 날도 여름의 일부다.`);
    const d = StatSystem.apply({ vitality:8, memory:1 });
    await UI.applyAndAnimate(d);
  }

  // 하루
  async function playDay(){
    const s=Store.s;
    // 아침: 날씨 결정 + 활력 회복(100) + 날씨 영향
    s.weather = WeatherSystem.roll();
    s.vitality = Math.max(0, Math.min(CONFIG.vitalityMax, CONFIG.vitalityMax + WeatherSystem.meta(s.weather).vital));
    UI.renderHud();
    await UI.dayTurn();

    // 아침 무대 + 장소 선택
    Scene.show('home', s.weather);
    Sound.bgm(weatherBgm[s.weather]);
    const wx = WeatherSystem.meta(s.weather);
    await UI.say('narration', `${DateUtil.for(s.dayIndex).short}, 날씨는 ${wx.label} ${wx.icon}. 오늘은 어디로 가볼까?`);

    // 날씨에 맞는 장소만 후보로
    const options = Object.values(LOCATIONS).filter(L=> !L.allowedWeather || L.allowedWeather.includes(s.weather));
    const pickList = Random.shuffle(options).slice(0, 4); // 매일 4곳 정도 제시
    const idx = await UI.choose(pickList.map(L=> ({ label:`${L.icon} ${L.name} <span style="opacity:.6">— ${L.blurb}</span>` })));
    const loc = pickList[idx].id;
    s.visited.push(loc);

    // 도착
    Scene.show(loc, s.weather, { image: loc+'_intro.webp' });
    await UI.say('narration', `${LOCATIONS[loc].name}에 도착했다. ${LOCATIONS[loc].blurb}.`);

    // 메인 이벤트
    const ev = EventManager.pickMain(loc);
    if(ev) await runEvent(ev, loc); else await fillerBeat(loc);

    // 활력 저하 시 추가(조건부) 이벤트 — 열사병/수분보충
    const cond = EventManager.pickConditional();
    if(cond) await runEvent(cond, loc);

    UI.renderHud();
  }

  async function runDays(){
    while(Store.s.dayIndex < CONFIG.totalDays){
      await playDay();
      Store.s.dayIndex++;
      Store.save();
    }
    await finish();
  }

  async function finish(){
    Store.s.finished=true; Store.save();
    Scene.show('home','sunny');
    Sound.bgm('birds');
    UI.hideDialogue();
    await new Promise(r=> setTimeout(r,500));
    // 개학 전야 한 마디
    const dlg = document.getElementById('dialogue'); dlg.style.display='flex';
    await UI.say('narration', '어느새 개학 전날 밤. 책상 위에 쌓인 사진들을 가만히 들여다본다.');
    await UI.say('you', '이번 여름… 진짜 잘 보냈다.');
    showReport();
  }

  function showReport(){
    const { ending, badges } = EndingSystem.compute();
    const s=Store.s;
    UI.hideDialogue();
    document.getElementById('hud').style.display='none';
    document.getElementById('choices').innerHTML='';
    const visitedSet=[...new Set(s.visited)];
    const albumHtml = s.memories.length
      ? s.memories.map(m=>`<div class="album-pol"><div class="album-pol__img">${m.emoji||'📸'}</div><div class="album-pol__cap">${m.cap||''}</div></div>`).join('')
      : `<div class="album-empty">이번 여름엔 사진이 많지 않았네. 다음엔 더 많은 추억을!</div>`;
    const badgeHtml = badges.length
      ? badges.map(b=>`<span class="badge">${b.emoji} ${b.name}</span>`).join('')
      : `<span class="badge">🌱 무사히 완주</span>`;

    document.getElementById('reportBody').innerHTML = `
      <div class="report__head">여름방학 리포트</div>
      <div class="report__ending">
        <h3>🏆 ${ending.title}</h3>
        <p>${ending.desc}</p>
      </div>
      <div class="report__grid">
        <div class="rcard"><div class="rcard__label">🛡 안전도</div><div class="rcard__big">${s.stats.safety}</div></div>
        <div class="rcard"><div class="rcard__label">⚡ 스릴</div><div class="rcard__big">${s.stats.thrill}</div></div>
        <div class="rcard"><div class="rcard__label">📸 추억 점수</div><div class="rcard__big">${s.stats.memory}</div></div>
        <div class="rcard"><div class="rcard__label">📷 특별한 추억</div><div class="rcard__big">${s.memories.length}<small>장</small></div></div>
        <div class="rcard"><div class="rcard__label">🗺️ 방문한 곳</div><div class="rcard__big">${visitedSet.length}<small>곳</small></div></div>
        <div class="rcard"><div class="rcard__label">🎬 경험한 사건</div><div class="rcard__big">${s.seenEvents.length}<small>개</small></div></div>
      </div>
      <div class="report__album">
        <h4>📸 ${s.memories.length}개의 특별한 추억</h4>
        <div class="album-grid">${albumHtml}</div>
      </div>
      <div class="report__album">
        <h4>🏅 획득한 배지</h4>
        <div class="badges">${badgeHtml}</div>
      </div>
      <div class="report__btns">
        <button class="btn-main" id="btnReplay">새로운 여름 시작하기</button>
      </div>`;
    document.getElementById('report').classList.add('show');
    Sound.sfx('success');
    document.getElementById('btnReplay').addEventListener('click', ()=>{
      Store.clear();
      location.reload();
    });
  }

  // 시작 / 이어하기
  async function newGame(){
    Store.reset();
    document.getElementById('intro').classList.remove('show');
    UI.showHud();
    Store.s.playerName = await UI.ask('여름방학이 시작됐다! 너의 이름을 알려줘', '게임 속에서 이 이름으로 불리게 돼.');
    UI.toast(`${Store.s.playerName}의 여름방학, 시작!`);
    Store.save();
    await runDays();
  }
  async function continueGame(){
    if(!Store.load()){ return newGame(); }
    document.getElementById('intro').classList.remove('show');
    UI.showHud(); UI.renderHud();
    await runDays();
  }
  return { newGame, continueGame, showReport };
})();

/* ═══════════════════════════════════════════════════════════════════════════
   18) Boot · 초기화
   ═══════════════════════════════════════════════════════════════════════════ */
(function boot(){
  // 사운드 토글
  document.getElementById('soundToggle').addEventListener('click', ()=> Sound.toggle());
  // 이어하기 버튼 노출
  if(Store.hasSave()){
    const c=document.getElementById('btnContinue');
    c.style.display='inline-block';
    c.addEventListener('click', ()=> Game.continueGame());
  }
  document.getElementById('btnStart').addEventListener('click', ()=>{
    if(Store.hasSave() && !confirm('새로 시작하면 저장된 여름방학이 사라져. 새로 시작할까?')) return;
    Game.newGame();
  });
  // 인트로 표시 + 부트 숨김
  document.getElementById('intro').classList.add('show');
  const b=document.getElementById('boot');
  setTimeout(()=>{ b.style.opacity='0'; b.style.pointerEvents='none'; setTimeout(()=> b.style.display='none', 600); }, 650);
})();
</script>
</body>
</html>
